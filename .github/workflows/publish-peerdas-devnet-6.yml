name: Publish peerdas-devnet-6 release

# only one per github sha can be run
concurrency:
  group: cd-publish-peerdas-devnet-6

on:
  push:
    branches:
      - peerdas-devnet-6

jobs:
  docker:
    name: Publish to Docker Hub
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # https://github.com/docker/setup-buildx-action
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push lodestar
        run: >
          docker buildx build . --push
          --tag ghcr.io/dguenther/lodestar:peerdas-devnet-6
          --platform linux/amd64
          --build-arg COMMIT=$(git rev-parse HEAD)

      - run: docker run ghcr.io/dguenther/lodestar:peerdas-devnet-6 --help
      # Display history to know byte size of each layer
      # Image is available only because of the previous `docker run` command
      - run: docker image history ghcr.io/dguenther/lodestar:peerdas-devnet-6

      - name: Build and push custom Grafana
        run: >
          docker buildx build ./docker/grafana/ --push
          --file ./docker/grafana/Dockerfile
          --build-context dashboards=./dashboards
          --tag ghcr.io/dguenther/lodestar-grafana:peerdas-devnet-6
          --platform linux/amd64

      - name: Build and push custom Prometheus
        run: >
          docker buildx build ./docker/prometheus/ --push
          --file ./docker/prometheus/Dockerfile
          --tag ghcr.io/dguenther/lodestar-prometheus:peerdas-devnet-6
          --platform linux/amd64
